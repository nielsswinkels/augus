services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      - pb_data:/app/pb_data
    expose:
      - "8090"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pb_data:
  caddy_data:
  caddy_config:
